<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음력 변환기 — 양력↔음력 (KASI 기준)</title>
<meta name="description" content="한국천문연구원(KASI) 기준 음력 양력 변환기. 음력 생일, 제삿날, 명절 날짜를 정확하게 변환합니다. 윤달까지 정확.">
<style>
  :root {
    --bg: #f7f8fa; --card: #fff; --line: #e6e8ec; --ink: #1a1d21;
    --sub: #6b7280; --accent: #2f6fed; --accent-weak: #eef3fe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
    -webkit-font-smoothing: antialiased; padding: 16px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { text-align: center; padding: 24px 0 16px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { color: var(--sub); font-size: 13px; margin-top: 6px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 20px; margin-bottom: 16px;
  }
  .toggle { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
  .toggle button {
    flex: 1; border: 0; background: transparent; padding: 9px; border-radius: 7px;
    font-size: 14px; font-weight: 600; color: var(--sub); cursor: pointer; transition: .15s;
  }
  .toggle button.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .field label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 11px 10px; border: 1px solid var(--line); border-radius: 9px;
    font-size: 16px; text-align: center; -moz-appearance: textfield;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .leap { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 14px; color: var(--sub); }
  .leap.hidden { display: none; }
  .leap input { width: 18px; height: 18px; accent-color: var(--accent); }
  .go {
    width: 100%; margin-top: 16px; padding: 14px; border: 0; border-radius: 11px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .go:active { opacity: .85; }
  .result { margin-top: 16px; padding: 18px; border-radius: 12px; background: var(--accent-weak); display: none; }
  .result.show { display: block; }
  .result .small { font-size: 12px; color: var(--accent); font-weight: 600; }
  .result .big { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .result .extra { font-size: 13px; color: var(--sub); margin-top: 8px; }
  .result.error { background: #fef1f1; }
  .result.error .small, .result.error .big { color: #d23f3f; }
  .note { font-size: 12px; color: var(--sub); text-align: center; margin-top: 8px; }
  footer { text-align: center; font-size: 12px; color: var(--sub); padding: 20px 0; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>음력 변환기</h1>
    <p>한국천문연구원(KASI) 기준 · 윤달까지 정확</p>
  </header>

  <div class="card">
    <div class="toggle">
      <button id="tabS2L" class="active" type="button">양력 → 음력</button>
      <button id="tabL2S" type="button">음력 → 양력</button>
    </div>

    <div class="fields">
      <div class="field"><label>연도</label><input id="y" type="number" inputmode="numeric" placeholder="2026"></div>
      <div class="field"><label>월</label><input id="m" type="number" inputmode="numeric" placeholder="2"></div>
      <div class="field"><label>일</label><input id="d" type="number" inputmode="numeric" placeholder="17"></div>
    </div>

    <label class="leap hidden" id="leapWrap">
      <input id="leap" type="checkbox"> 윤달입니다 (음력 → 양력일 때만)
    </label>

    <button class="go" id="convert" type="button">변환하기</button>

    <div class="result" id="result">
      <div class="small" id="rLabel"></div>
      <div class="big" id="rMain"></div>
      <div class="extra" id="rExtra"></div>
    </div>
    <p class="note" id="loading">엔진 불러오는 중…</p>
  </div>

  <footer>
    <a href="./index.html">← 생활 계산기 홈</a> · <a href="./gift-money.html">축의금 계산기</a><br>
    KASI 기준 음력 데이터 · iOS 앱 엔진: <a href="https://github.com/yoonjason/KoreanLunarKit" target="_blank" rel="noopener">KoreanLunarKit</a>
  </footer>
</div>

<script type="module">
  // npm 로컬 설치 없이 CDN(esm.sh)에서 직접 로드 → 더블클릭으로 바로 작동
  import KoreanLunarCalendar from 'https://esm.sh/korean-lunar-calendar';

  const cal = new KoreanLunarCalendar();
  const $ = (id) => document.getElementById(id);
  let mode = 'S2L'; // S2L: 양력→음력, L2S: 음력→양력

  $('loading').style.display = 'none';

  function setMode(next) {
    mode = next;
    $('tabS2L').classList.toggle('active', mode === 'S2L');
    $('tabL2S').classList.toggle('active', mode === 'L2S');
    $('leapWrap').classList.toggle('hidden', mode !== 'L2S');
    $('result').classList.remove('show');
  }

  $('tabS2L').addEventListener('click', () => setMode('S2L'));
  $('tabL2S').addEventListener('click', () => setMode('L2S'));

  function showResult({ label, main, extra, isError }) {
    const r = $('result');
    r.classList.add('show');
    r.classList.toggle('error', !!isError);
    $('rLabel').textContent = label;
    $('rMain').textContent = main;
    $('rExtra').textContent = extra || '';
  }

  function pad(n) { return String(n).padStart(2, '0'); }
  const WEEK = ['일', '월', '화', '수', '목', '금', '토'];

  $('convert').addEventListener('click', () => {
    const y = parseInt($('y').value, 10);
    const m = parseInt($('m').value, 10);
    const d = parseInt($('d').value, 10);

    if (!y || !m || !d) {
      showResult({ label: '입력 오류', main: '연·월·일을 모두 입력하세요', isError: true });
      return;
    }

    try {
      if (mode === 'S2L') {
        if (!cal.setSolarDate(y, m, d)) throw new Error('변환할 수 없는 날짜입니다');
        const l = cal.getLunarCalendar();
        const leapText = l.intercalation ? ' (윤달)' : '';
        showResult({
          label: '음력',
          main: `${l.year}년 ${l.month}월 ${l.day}일${leapText}`,
          extra: cal.getKoreanGapja ? cal.getKoreanGapja() : '',
        });
      }
      else {
        const isLeap = $('leap').checked;
        if (!cal.setLunarDate(y, m, d, isLeap)) throw new Error('변환할 수 없는 날짜입니다 (윤달 여부를 확인하세요)');
        const s = cal.getSolarCalendar();
        const dateObj = new Date(s.year, s.month - 1, s.day);
        showResult({
          label: '양력',
          main: `${s.year}년 ${s.month}월 ${s.day}일`,
          extra: `${s.year}-${pad(s.month)}-${pad(s.day)} (${WEEK[dateObj.getDay()]}요일)`,
        });
      }
    } catch (e) {
      showResult({ label: '변환 실패', main: e.message, isError: true });
    }
  });
</script>
</body>
</html>
